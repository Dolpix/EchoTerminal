<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 345" font-family="ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,Liberation Mono,monospace">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
    <marker id="b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#388bfd"/>
    </marker>
  </defs>

  <rect width="760" height="345" fill="#0d1117" rx="8"/>

  <!-- ── Row 1: Terminal ───────────────────────────────── -->
  <rect x="280" y="20" width="200" height="65" rx="6" fill="#161b22" stroke="#388bfd" stroke-width="2"/>
  <text x="380" y="50" text-anchor="middle" fill="#79c0ff" font-size="15" font-weight="700">Terminal</text>
  <text x="380" y="70" text-anchor="middle" fill="#6e7681" font-size="11">orchestrates the pipeline</text>

  <!-- Lines: Terminal → Registries (solid gray) -->
  <line x1="380" y1="85" x2="110" y2="127" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="380" y1="85" x2="380" y2="127" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="380" y1="85" x2="652" y2="127" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- ── Row 2: Registries ─────────────────────────────── -->
  <rect x="20"  y="130" width="180" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="110" y="160" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">ParserRegistry</text>
  <text x="110" y="180" text-anchor="middle" fill="#6e7681" font-size="11">discovers parsers</text>

  <rect x="295" y="130" width="170" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="380" y="160" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">SuggestorRegistry</text>
  <text x="380" y="180" text-anchor="middle" fill="#6e7681" font-size="11">discovers suggesters</text>

  <rect x="560" y="130" width="180" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="650" y="160" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">TerminalView</text>
  <text x="650" y="180" text-anchor="middle" fill="#6e7681" font-size="11">owns UI components</text>

  <!-- Lines: Registries → Interfaces (dashed blue) -->
  <line x1="110" y1="200" x2="110" y2="228" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#b)"/>
  <line x1="380" y1="200" x2="380" y2="228" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#b)"/>
  <line x1="650" y1="200" x2="650" y2="228" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#b)"/>

  <!-- ── Row 3: Extension Interfaces ──────────────────── -->
  <rect x="20"  y="230" width="180" height="90" rx="6" fill="#0d1117" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="110" y="258" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="600">ITokenParser</text>
  <text x="110" y="278" text-anchor="middle" fill="#6e7681" font-size="11">add parsing for</text>
  <text x="110" y="296" text-anchor="middle" fill="#6e7681" font-size="11">a new type</text>

  <rect x="295" y="230" width="170" height="90" rx="6" fill="#0d1117" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="380" y="258" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="600">ISuggester</text>
  <text x="380" y="278" text-anchor="middle" fill="#6e7681" font-size="11">add autocomplete</text>
  <text x="380" y="296" text-anchor="middle" fill="#6e7681" font-size="11">for a type</text>

  <rect x="560" y="230" width="180" height="90" rx="6" fill="#0d1117" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="650" y="258" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="600">IEchoComponent</text>
  <text x="650" y="278" text-anchor="middle" fill="#6e7681" font-size="11">add a UI</text>
  <text x="650" y="296" text-anchor="middle" fill="#6e7681" font-size="11">component</text>

  <!-- Legend -->
  <line x1="20" y1="334" x2="44" y2="334" stroke="#388bfd" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="50" y="338" fill="#6e7681" font-size="10">= interface you implement to extend the system</text>
</svg>
