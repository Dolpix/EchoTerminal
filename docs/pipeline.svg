<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 130" font-family="ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,Liberation Mono,monospace">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#484f58"/>
    </marker>
  </defs>

  <rect width="960" height="130" fill="#0d1117" rx="8"/>

  <!-- Box 1: Input -->
  <rect x="10" y="25" width="140" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="80" y="57" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Input</text>
  <text x="80" y="76" text-anchor="middle" fill="#6e7681" font-size="11">raw string</text>

  <line x1="150" y1="60" x2="186" y2="60" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 2: Tokenizer -->
  <rect x="190" y="25" width="145" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="262" y="57" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Tokenizer</text>
  <text x="262" y="76" text-anchor="middle" fill="#6e7681" font-size="11">string &#x2192; Token[]</text>

  <line x1="335" y1="60" x2="371" y2="60" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 3: CommandParser -->
  <rect x="375" y="25" width="175" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="462" y="57" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">CommandParser</text>
  <text x="462" y="76" text-anchor="middle" fill="#6e7681" font-size="11">pick best overload</text>

  <line x1="550" y1="60" x2="586" y2="60" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 4: CommandExecutor -->
  <rect x="590" y="25" width="185" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="682" y="57" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">CommandExecutor</text>
  <text x="682" y="76" text-anchor="middle" fill="#6e7681" font-size="11">invoke via reflection</text>

  <line x1="775" y1="60" x2="811" y2="60" stroke="#484f58" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Box 5: Terminal.Log -->
  <rect x="815" y="25" width="135" height="70" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="882" y="57" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">Terminal.Log</text>
  <text x="882" y="76" text-anchor="middle" fill="#6e7681" font-size="11">display result</text>
</svg>
